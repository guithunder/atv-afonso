<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libra Negona</title>

    <link rel="icon" type="image/png" href="libras/negona-silent-hill.gif">
    <link rel="stylesheet" href="/css/INdex.css">
</head>

<body>

  <main class="container">

    <h1>Libra Negona</h1>

    <div class="imagem-container">
      <img 
        src="libras/negona-silent-hill.gif" 
        alt="Imagem Libra Negona"
      >
    </div>

    <p class="pergunta">Aceitas a chave da libra?</p>

    <button class="botao-audio" onclick="tocarAudio()">
      🔊 Tocar Áudio
    </button>

    <audio id="meuAudio">
        <source src="audio/nossa-esturado-seu-madruga.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>

  </main>

  <script>
    function tocarAudio() {
      const audio = document.getElementById("meuAudio");
      audio.play();
    }
  </script>

</body>
</html>
